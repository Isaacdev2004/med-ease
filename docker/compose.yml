name: medease

services:
  postgres:
    image: postgres:16-alpine
    container_name: medease-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medease}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medease_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-medease}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-medease} -d ${POSTGRES_DB:-medease}',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - medease

  redis:
    image: redis:7-alpine
    container_name: medease-redis
    restart: unless-stopped
    command: ['redis-server', '--save', '60', '1', '--loglevel', 'warning']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - medease

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: medease-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-medease}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-medease_minio_dev}
    ports:
      - '${MINIO_API_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - medease

  minio-init:
    image: minio/mc:RELEASE.2025-04-22T03-04-28Z
    container_name: medease-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_HOST: minio
      MINIO_PORT: 9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-medease}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-medease_minio_dev}
      MINIO_BUCKET_DOCUMENTS: ${MINIO_BUCKET_DOCUMENTS:-medease-documents}
      MINIO_BUCKET_EXPORTS: ${MINIO_BUCKET_EXPORTS:-medease-exports}
    volumes:
      - ./minio/init-buckets.sh:/init-buckets.sh:ro
    entrypoint: ['/bin/sh', '/init-buckets.sh']
    networks:
      - medease

  opensearch:
    image: opensearchproject/opensearch:2.19.1
    container_name: medease-opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      plugins.security.disabled: 'true'
      DISABLE_INSTALL_DEMO_CONFIG: 'true'
      OPENSEARCH_JAVA_OPTS: ${OPENSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
      bootstrap.memory_lock: 'true'
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - '${OPENSEARCH_PORT:-9200}:9200'
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -fsS http://localhost:9200/_cluster/health | grep -vq "\\"status\\":\\"red\\""',
        ]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - medease

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.19.1
    container_name: medease-opensearch-dashboards
    restart: unless-stopped
    depends_on:
      opensearch:
        condition: service_healthy
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: 'true'
    ports:
      - '${OPENSEARCH_DASHBOARDS_PORT:-5601}:5601'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -fsS http://localhost:5601/api/status | grep -q available',
        ]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s
    networks:
      - medease

  mailpit:
    image: axllent/mailpit:v1.27.3
    container_name: medease-mailpit
    restart: unless-stopped
    ports:
      - '${MAILPIT_SMTP_PORT:-1025}:1025'
      - '${MAILPIT_UI_PORT:-8025}:8025'
    volumes:
      - mailpit_data:/data
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8025/livez']
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - medease

  pgadmin:
    image: dpage/pgadmin4:9.2
    container_name: medease-pgadmin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@medease.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-medease_pgadmin_dev}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - '${PGADMIN_PORT:-5050}:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:80/misc/ping']
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - medease

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: medease-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      opensearch:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL:-postgresql://medease:medease_dev_password@postgres:5432/medease}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-medease}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-medease_minio_dev}
      MINIO_BUCKET_DOCUMENTS: ${MINIO_BUCKET_DOCUMENTS:-medease-documents}
      OPENSEARCH_URL: ${OPENSEARCH_URL:-http://opensearch:9200}
      API_PREFIX: ${API_PREFIX:-api}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      HELMET_ENABLED: ${HELMET_ENABLED:-true}
      MAIL_HOST: ${MAIL_HOST:-mailpit}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_FROM: ${MAIL_FROM:-noreply@medease.local}
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      GIT_COMMIT: ${GIT_COMMIT:-local}
      BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-}
      APP_VERSION: ${APP_VERSION:-0.0.0}
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-minimum-thirty-two-characters-long}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
    ports:
      - '${API_PORT:-3000}:3000'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/api/healthz/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - medease

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    container_name: medease-worker
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      GIT_COMMIT: ${GIT_COMMIT:-local}
      BUILD_TIMESTAMP: ${BUILD_TIMESTAMP:-}
      APP_VERSION: ${APP_VERSION:-0.0.0}
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-minimum-thirty-two-characters-long}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
    ports:
      - '${WORKER_PORT:-3001}:3001'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3001/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 25s
    networks:
      - medease

networks:
  medease:
    name: medease-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  opensearch_data:
  mailpit_data:
  pgadmin_data:
