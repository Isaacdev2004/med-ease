groups:
  - name: medease-platform
    rules:
      - alert: PostgreSQLUnavailable
        expr: medease_dependency_up{dependency="postgresql"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: PostgreSQL dependency is unavailable

      - alert: RedisUnavailable
        expr: medease_dependency_up{dependency="redis"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Redis dependency is unavailable

      - alert: WorkerOffline
        expr: up{job="medease-worker"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Med-Ease worker scrape target is offline

      - alert: ApiOffline
        expr: up{job="medease-api"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: Med-Ease API scrape target is offline

      - alert: QueueBacklogHigh
        expr: sum(medease_queue_depth{state=~"waiting|delayed"}) > 1000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Queue backlog exceeds threshold

      - alert: DeadLetterQueueGrowth
        expr: increase(medease_queue_dlq_total[15m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Jobs are entering dead-letter queues

      - alert: ApiErrorRateHigh
        expr: |
          sum(rate(medease_http_requests_total{status_code=~"5.."}[5m]))
          /
          clamp_min(sum(rate(medease_http_requests_total[5m])), 0.001)
          > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: API 5xx error rate exceeds 5%

      - alert: ApiLatencyHigh
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(medease_http_request_duration_seconds_bucket[5m])) by (le)
          ) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: API p95 latency exceeds 2 seconds
