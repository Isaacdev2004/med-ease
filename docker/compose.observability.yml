name: medease-observability

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.128.0
    container_name: medease-otel-collector
    restart: unless-stopped
    command: ['--config=/etc/otel-collector-config.yaml']
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - '${OTEL_COLLECTOR_GRPC_PORT:-4317}:4317'
      - '${OTEL_COLLECTOR_HTTP_PORT:-4318}:4318'
    networks:
      - medease

  tempo:
    image: grafana/tempo:2.8.1
    container_name: medease-tempo
    restart: unless-stopped
    command: ['-config.file=/etc/tempo/tempo-config.yml']
    volumes:
      - ./observability/tempo/tempo-config.yml:/etc/tempo/tempo-config.yml:ro
      - tempo_data:/var/tempo
    ports:
      - '${TEMPO_PORT:-3200}:3200'
    networks:
      - medease

  loki:
    image: grafana/loki:3.5.1
    container_name: medease-loki
    restart: unless-stopped
    command: ['-config.file=/etc/loki/loki-config.yml']
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - '${LOKI_PORT:-3100}:3100'
    networks:
      - medease

  promtail:
    image: grafana/promtail:3.5.1
    container_name: medease-promtail
    restart: unless-stopped
    command: ['-config.file=/etc/promtail/promtail-config.yml']
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - medease

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: medease-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - '${PROMETHEUS_PORT:-9090}:9090'
    networks:
      - medease

  grafana:
    image: grafana/grafana:12.0.2
    container_name: medease-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-medease_grafana_dev}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - '${GRAFANA_PORT:-3002}:3000'
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - medease

networks:
  medease:
    external: true
    name: medease-network

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:
