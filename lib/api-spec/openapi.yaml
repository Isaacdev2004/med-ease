info:
  title: Api
  description: Med-Ease enterprise healthcare platform API
  version: 0.1.0
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    HealthCheckResponse:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    JsonObject:
      type: object
      additionalProperties: true
