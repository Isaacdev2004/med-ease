name: Platform CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: platform-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.12.4'
  CI: 'true'
  DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
  DIRECT_URL: ${{ secrets.SUPABASE_DIRECT_URL || secrets.SUPABASE_DATABASE_URL }}
  REDIS_URL: ${{ secrets.REDIS_URL }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  SUPABASE_STORAGE_BUCKET_DOCUMENTS: medease-documents
  SUPABASE_STORAGE_BUCKET_EXPORTS: medease-exports
  WORKER_QUEUE_NAME: medease-health-check
  JWT_SECRET: dev-only-secret-minimum-thirty-two-characters-long
  AUTH_COOKIE_SECURE: false
  API_PORT: '3000'
  WORKER_PORT: '3001'
  MAIL_HOST: localhost
  MAIL_PORT: '1025'
  MAIL_FROM: noreply@medease.local

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    env:
      # Validate/generate must not depend on Supabase secrets (smoke job uses real URLs).
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/postgres?sslmode=disable
      DIRECT_URL: postgresql://ci:ci@127.0.0.1:5432/postgres?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma validate
        run: pnpm prisma:validate

      - name: Prisma generate
        run: pnpm prisma:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Build packages
        run: pnpm build:libs

      - name: Unit tests with coverage gate
        run: node scripts/ci/verify-coverage.mjs

      - name: Build
        run: pnpm build

      - name: IAM mock repository contract tests
        run: pnpm --filter @workspace/medease run test:contract:mock

      - name: OpenAPI regeneration check
        run: node scripts/ci/verify-openapi-regen.mjs

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit
        run: pnpm audit --audit-level high
        continue-on-error: true

      - name: License check
        run: pnpm dlx license-checker --summary --failOn "GPL;AGPL;LGPL;SSPL"

      - name: Generate SBOM (CycloneDX)
        run: |
          mkdir -p ci-artifacts
          pnpm dlx pnpm@11 --pm-on-fail=ignore sbom --sbom-format cyclonedx --lockfile-only --out ci-artifacts/sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: ci-artifacts/sbom.json

      - name: Secret scanning (gitleaks)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  smoke:
    name: Platform Smoke
    runs-on: ubuntu-latest
    needs: verify
    # Fork PRs cannot read repository secrets; skip instead of failing opaquely.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    env:
      DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL || secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.SUPABASE_DIRECT_URL || secrets.DIRECT_URL || secrets.SUPABASE_DATABASE_URL || secrets.DATABASE_URL }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Supabase CI secrets
        env:
          SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          LEGACY_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_DIRECT_URL: ${{ secrets.SUPABASE_DIRECT_URL }}
          LEGACY_DIRECT_URL: ${{ secrets.DIRECT_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          set -euo pipefail
          missing=()

          if [ -z "${SUPABASE_DATABASE_URL}" ] && [ -z "${LEGACY_DATABASE_URL}" ]; then
            missing+=("SUPABASE_DATABASE_URL")
          fi
          if [ -z "${SUPABASE_URL}" ]; then missing+=("SUPABASE_URL"); fi
          if [ -z "${SUPABASE_ANON_KEY}" ]; then missing+=("SUPABASE_ANON_KEY"); fi
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then missing+=("SUPABASE_SERVICE_ROLE_KEY"); fi
          if [ -z "${REDIS_URL}" ]; then missing+=("REDIS_URL"); fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing repository secrets: ${missing[*]}"
            echo ""
            echo "Add them at:"
            echo "  https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo ""
            echo "Required names (exact spelling):"
            echo "  SUPABASE_DATABASE_URL  ← copy DATABASE_URL from database/.env"
            echo "  SUPABASE_URL"
            echo "  SUPABASE_ANON_KEY"
            echo "  SUPABASE_SERVICE_ROLE_KEY"
            echo "  REDIS_URL"
            echo "Optional: SUPABASE_DIRECT_URL (falls back to SUPABASE_DATABASE_URL)"
            echo ""
            echo "Use Repository secrets (Actions), not Environment or Dependabot secrets."
            exit 1
          fi

          db_url="${SUPABASE_DATABASE_URL:-$LEGACY_DATABASE_URL}"
          direct_url="${SUPABASE_DIRECT_URL:-${LEGACY_DIRECT_URL:-$db_url}}"

          echo "DATABASE_URL=${db_url}" >> "$GITHUB_ENV"
          echo "DIRECT_URL=${direct_url}" >> "$GITHUB_ENV"
          echo "All required Supabase CI secrets are present."

      - name: Prisma generate
        run: pnpm prisma:generate

      - name: Apply database migrations
        run: pnpm prisma:migrate:deploy

      - name: Seed database
        run: pnpm --filter @medease/database run seed

      - name: RLS integration tests
        run: pnpm --filter @medease/prisma run test:integration

      - name: Build API and Worker
        run: |
          pnpm --filter @medease/api run build
          pnpm --filter @medease/worker run build

      - name: Platform certification (smoke + E2E + contracts)
        run: node scripts/ci/run-smoke-ci.mjs

  artifacts:
    name: Artifacts
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: pnpm prisma:generate

      - name: Archive platform artifacts
        run: |
          mkdir -p ci-artifacts
          cp lib/api-spec/openapi.yaml ci-artifacts/openapi.yaml
          tar -czf ci-artifacts/prisma-schema.tar.gz database/prisma
          pnpm --filter @medease/queue run test:coverage 2>&1 | tee ci-artifacts/coverage-report.txt

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: platform-artifacts
          path: ci-artifacts/
