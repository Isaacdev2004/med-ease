kind = "web"
previewPath = "/"
title = "Med'ease"
version = "1.0.0"
id = "artifacts/medease"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22045

[services.development]
run = "pnpm --filter @workspace/medease run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/medease", "run", "build" ]
serve = "static"
publicDir = "artifacts/medease/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22045"
BASE_PATH = "/"
